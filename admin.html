<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAL Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div>
    <h1>Admin Panel</h1>
    <p>Add / remove PAL tutors</p>
  </div>

  <a class="admin-btn" href="index.html">Back</a>
</header>

<div class="container">

  <div class="form">
    <input id="name" placeholder="Name">
    <input id="subject" placeholder="Subject (Math, English, CS...)">
    <input id="email" placeholder="Email">
    <input id="schedule" placeholder="Schedule (Mon/Wed 10–11)">
    <textarea id="bio" placeholder="Short bio"></textarea>

    <button onclick="addTutor()">Add Tutor</button>
  </div>

  <h2 style="margin-top:20px;">Current Tutors</h2>
  <div id="adminGrid"></div>

</div>

<script src="app.js"></script>
<script>
  renderAdmin();
</script>

</body>
</html>
