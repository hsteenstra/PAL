<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morse Shipbuilders PAL Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1b2b;
    color: #e6f0ff;
  }

  header {
    background: linear-gradient(90deg, #123a5a, #1f5f8b);
    padding: 20px;
    text-align: center;
    border-bottom: 4px solid #f2b705;
  }

  header h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 1px;
  }

  header p {
    margin: 5px 0 0;
    opacity: 0.8;
  }

  .container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
  }

  input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
  }

  .card {
    background: #132b40;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    border-left: 5px solid #f2b705;
  }

  .name {
    font-size: 18px;
    font-weight: bold;
  }

  .subject {
    opacity: 0.8;
    margin: 5px 0;
  }

  .schedule {
    font-size: 14px;
    margin-bottom: 10px;
    color: #b9d6ff;
  }

  button {
    margin-right: 10px;
    margin-top: 5px;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .email {
    background: #2ecc71;
    color: white;
  }

  .flag {
    background: #e74c3c;
    color: white;
  }

  .tag {
    font-size: 12px;
    padding: 2px 6px;
    background: #1f5f8b;
    border-radius: 4px;
    margin-left: 5px;
  }
</style>
</head>

<body>

<header>
  <h1>Morse Shipbuilders PAL Hub ⚓</h1>
  <p>Find tutors, check schedules, get help faster</p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search by student name or subject (Math, English, CS...)">

<div id="list"></div>

</div>

<script>
const tutors = [
  {
    name: "Alex Rivera",
    subject: "AP Precalc / Math",
    email: "alex@school.org",
    schedule: "Mon/Wed 10:00–11:30, Fri 12:00–1:00"
  },
  {
    name: "Jordan Lee",
    subject: "English / Writing",
    email: "jordan@school.org",
    schedule: "Tue/Thu 9:00–10:30"
  },
  {
    name: "Sam Patel",
    subject: "Computer Science",
    email: "sam@school.org",
    schedule: "Mon–Fri 1:00–2:00"
  },
  {
    name: "Taylor Brooks",
    subject: "History / AP World",
    email: "taylor@school.org",
    schedule: "Wed/Fri 8:30–10:00"
  }
];

const list = document.getElementById("list");
const search = document.getElementById("search");

function render(data) {
  list.innerHTML = "";

  data.forEach((tutor, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="name">
        ${tutor.name}
        <span class="tag">PAL Tutor</span>
      </div>
      <div class="subject">${tutor.subject}</div>
      <div class="schedule">📅 ${tutor.schedule}</div>

      <button class="email" onclick="emailTutor('${tutor.email}')">Email</button>
      <button class="flag" onclick="flagTutor(${i})">Flag</button>
    `;

    list.appendChild(card);
  });
}

function emailTutor(email) {
  window.location.href = `mailto:${email}`;
}

function flagTutor(index) {
  alert("Flag sent to PAL coordinator (demo feature).");
}

search.addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = tutors.filter(t =>
    t.name.toLowerCase().includes(value) ||
    t.subject.toLowerCase().includes(value)
  );

  render(filtered);
});

render(tutors);
</script>

</body>
</html>
